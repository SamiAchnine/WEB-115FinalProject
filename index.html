<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sami's Music Player</title>
    <link rel="stylesheet" href="./style.css">
    
</head>
<body>
    <h1>Sami's Music Player</h1>

    <section class="musicPlayer" id="musicPlayer">
        <div class="tracklist" id="tracklist">
            <button id="addNewPlaylist">Add new playlist</button>
            <button id="savePlaylists">Save all playlists</button>
            <div class="listCategory" id="dummyListCategory">
                <button class="openListButton" id="dummyOpenButton">Dummy Button</button>
                <ul class="listTracks" id="dummyListTracks"> 
                    <li class="dummyTrack"> 
                        Dummy track
                    </li>
                </ul>
            </div>
        </div>
        </div>
        <div id="player">
            <div id="albumCoverDiv">
                <img id="albumCover" src="./covers/noSong.png" width="275px" height="275px">
            </div>
            <div id="metadataDiv">
                <p id="title">
                    No song selected
                </p>
                <p id="gameName">
                    No game selected
                </p>
                <div id="audioPlayer">
                    <div class="audioPlayerControls">
                        <div class="controlsButtons">
                            <button class="controlsButton" id="play">&#9654;</button>
                            <button class="controlsButton" id="pause">&#9208;</button>
                            <button class="controlsButton" id="stop">&#9632;</button>
                        </div>
                        <div style="display: flex; align-items: center; gap: 1rem;"> 
                            <!-- div to prevent line breaks-->
                            <label for="volumeSlider">Volume</label>
                            <input type="range" id="volumeSlider" min="0" max="100" value="100">
                        </div>
                        
                    </div>
                    <audio id="theActualMusicPlayingElement">Your browser is SO ancient that it can't even play audio. Sad.</audio>
                </div>
            </div>
        </div>
    </section>
</body>
<script src="./script.js" defer></script>
</html>
